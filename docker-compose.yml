x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL:-http://localhost}

  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-simbisa}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-secret}

  CACHE_STORE: ${CACHE_STORE:-file}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: 6379

  SESSION_DRIVER: ${SESSION_DRIVER:-cookie}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}

  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}

  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-debug}

  MAIL_MAILER: ${MAIL_MAILER:-failover}
  MAIL_HOST: ${MAIL_HOST:-smtp.sendgrid.net}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_SCHEME: ${MAIL_SCHEME:-null}
  MAIL_USERNAME: ${MAIL_USERNAME:-apikey}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-AssetLinq}

  VITE_API_BASE_URL: ${APP_URL:-http://localhost}

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: simbisa_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-simbisa}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_BIND_ADDRESS:-127.0.0.1}:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetlinq_app
    restart: unless-stopped
    working_dir: /app
    environment: *app-environment
    
    volumes:
      - .:/app
      - storage_data:/app/storage
      - bootstrap_cache:/app/bootstrap/cache
    
    ports:
      - "${APP_PORT:-8000}:9000"
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    networks:
      - app-network
    
    command: php-fpm

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simbisa_worker
    restart: unless-stopped
    working_dir: /app
    environment: *app-environment
    volumes:
      - .:/app
      - storage_data:/app/storage
      - bootstrap_cache:/app/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simbisa_scheduler
    restart: unless-stopped
    working_dir: /app
    environment: *app-environment
    volumes:
      - .:/app
      - storage_data:/app/storage
      - bootstrap_cache:/app/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    command: php artisan schedule:work

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: simbisa_nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_PORT_SSL:-443}:443"
    volumes:
      - .:/app
      - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - .docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - app-network

volumes:
  postgres_data:
    name: simbisa_postgres_data
    driver: local
  redis_data:
    name: simbisa_redis_data
    driver: local
  storage_data:
    name: simbisa_storage_data
    driver: local
  bootstrap_cache:
    name: simbisa_bootstrap_cache
    driver: local

networks:
  app-network:
    driver: bridge
